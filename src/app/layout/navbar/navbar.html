<header class="navbar">
  <!-- LOGO -->
  <a routerLink="/home" class="logo">
    <img src="imagenes/la.png" alt="BURCELLE Logo">
  </a>

  <!-- LINKS (ESCRITORIO) -->
  <nav class="nav-links">
        <a routerLink="/carrito" class="cart-link">
  <span class="cart-icon"></span>
  <span class="cart-badge" *ngIf="cartCount > 0">{{cartCount}}</span>
</a>


    <a routerLink="/home" routerLinkActive="active">Home</a>
    <a routerLink="/login">Entrar</a>
    <a routerLink="/contacto">Contáctanos</a>

    <!-- 🛒 CARRITO -->
    <a routerLink="/carrito" class="cart-link">
      🛒
      <span class="cart-badge" *ngIf="cartCount > 0">{{cartCount}}</span>
    </a>
  </nav>

  <!-- BOTÓN HAMBURGUESA (CELULAR) -->
  <button class="menu-btn" (click)="menuOpen = !menuOpen">
    ☰
  </button>
</header>

<!-- MENU MOBILE -->
<div class="mobile-menu" *ngIf="menuOpen">
  <a routerLink="/home" (click)="menuOpen=false">Home</a>
  <a routerLink="/login" (click)="menuOpen=false">Entrar</a>
  <a routerLink="/contacto" (click)="menuOpen=false">Contáctanos</a>

  <a routerLink="/carrito" class="cart-mobile" (click)="menuOpen=false">
    🛒 Carrito
    <span class="cart-badge" *ngIf="cartCount > 0">{{cartCount}}</span>
  </a>
</div>
