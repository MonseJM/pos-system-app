    <span class="blob b2"></span>

>
<!-- NAVBAR SEPARADO -->
 <app-navbar></app-navbar>
  <!-- CONTENEDOR PRINCIPAL -->
  <main class="container">

    <!-- IZQUIERDA (IMAGEN) -->
    <section class="left">
      <div class="image-box">
        <img src="imagenes/ca.png" alt="Borcelle" />
      </div>
    </section>

    <!-- DERECHA (LOGIN) -->
    <section class="center">
      <div class="login-card">
        <h1>Bienvenido</h1>
        <p>Inicia sesión para entrar</p>

        <form class="login-form" (ngSubmit)="entrar()">
          <div class="input-group">
            <label for="email">Correo</label>
            <input type="email" id="email" placeholder="ejemplo@gmail.com" [(ngModel)]="datos.email" name="email" required>
          </div>

          <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" [(ngModel)]="datos.password" name="password" required>
          </div>

          <button type="submit" class="btn-login">Iniciar sesión</button>

          <div class="extras">
            <a href="#">¿Olvidaste tu contraseña?</a>
          
            <a (click)="abrirRegistro()">Crear cuenta</a>
          
          </div>
        </form>
      </div>
    </section>
 <div class="modal-overlay" *ngIf="mostrarRegistro">
  <div class="modal-card">

    <button class="close-btn" (click)="cerrarRegistro()">×</button>

    <h2>Crear Cuenta 💖</h2>

    <div class="form-group">
       <label for="password">Escriba un Nombre</label>
      <input type="text" placeholder="Nombre completo"
             [(ngModel)]="datos.fullName" name="fullName">
    </div>

    <div class="form-group">
       <label for="password">Escriba un correo electrónico</label>
      <input type="email" placeholder="Correo electrónico"
             [(ngModel)]="datos.email" name="email">
    </div>

    <div class="form-group">
      <label for="password">Escriba una contraseña:</label>
      <input type="password" placeholder="Contraseña"
             [(ngModel)]="datos.password" name="password">
    </div>

    <button class="btn-primary" (click)="registrar()">
      Crear Cuenta ✨
    </button>

  </div>
</div>

  </main>
